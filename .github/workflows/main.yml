name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      IMAGE: ghcr.io/${{ github.repository_owner }}/dotfiles
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.CR_PAT }}
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
      - uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE }}:${{ github.sha }}
      - uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE }}:laetst
        if: github.ref == 'refs/heads/main'

  format:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: lua
            cmd: |
              stylua --check -g '*.lua' -- config/{.config,.hammerspoon}
          - name: sh
            cmd: |
              shfmt -i 2 -d bin config/{.bin,.config/zsh} install
    name: format-${{ matrix.name }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: aquaproj/aqua-installer@11dd79b4e498d471a9385aa9fb7f62bb5f52a73c # v4.0.4
        with:
          aqua_version: v2.59.1
      - run: ${{ matrix.cmd }}

  # https://aquaproj.github.io/docs/guides/checksum#recommend-autofixci-or-securefix-action-instead-of-update-checksum-action-and-update-checksum-workflow
  # Requires the autofix.ci GitHub App to be installed on this repository: https://autofix.ci/
  update-aqua-checksums:
    runs-on: ubuntu-latest
    permissions: {}
    timeout-minutes: 15
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: aquaproj/aqua-installer@11dd79b4e498d471a9385aa9fb7f62bb5f52a73c # v4.0.4
        with:
          aqua_version: v2.59.1
      - name: Update aqua-checksums.json
        run: |
          git ls-files 'aqua.yaml' '**/aqua.yaml' | while read -r f; do
            (cd "$(dirname "$f")" && aqua upc -prune)
          done
      - uses: autofix-ci/action@c5b2d67aa2274e7b5a18224e8171550871fc7e4a # v1.3.4

  status-check:
    runs-on: ubuntu-latest
    needs:
      - build
      - format
      - update-aqua-checksums
    permissions: {}
    if: failure()
    steps:
      - run: exit 1
